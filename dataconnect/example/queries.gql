query ListItems @auth(level: PUBLIC) {
  items(orderBy: [{ createdAt: DESC }]) {
    id
    title
    description
    createdAt
    status
    price
    imageUrl
    locationDetails
    category
    meetupLocationType
    meetupLocationDetails
    condition
    lender {
      uid
      displayName
      photoUrl
    }
  }
}

query GetItem($id: UUID!) @auth(level: PUBLIC) {
  item(id: $id) {
    id
    title
    description
    createdAt
    status
    price
    imageUrl
    locationDetails
    category
    meetupLocationType
    meetupLocationDetails
    condition
    lender {
      uid
      displayName
      photoUrl
    }
  }
}

query ListMyItems @auth(level: USER) {
  items(where: { lenderUid: { eq_expr: "auth.uid" } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    description
    createdAt
    status
    price
    imageUrl
    locationDetails
    category
    meetupLocationType
    meetupLocationDetails
    condition
  }
}

query ListIncomingRequests @auth(level: USER) {
  lendingRequests(
    where: { lenderUid: { eq_expr: "auth.uid" } }
    orderBy: [{ requestedAt: DESC }]
  ) {
    id
    requestedAt
    status
    borrowerNotes
    startDate
    endDate
    item {
      id
      title
      price
    }
    borrower {
      uid
      displayName
      averageRating
      reviewCount
    }
  }
}

query ListOutgoingRequests @auth(level: USER) {
  lendingRequests(
    where: { borrowerUid: { eq_expr: "auth.uid" } }
    orderBy: [{ requestedAt: DESC }]
  ) {
    id
    requestedAt
    status
    borrowerNotes
    startDate
    endDate
    item {
      id
      title
      price
      lender {
        uid
        displayName
      }
    }
    lender {
      uid
      displayName
      averageRating
      reviewCount
    }
  }
}

query ListMyReviews @auth(level: USER) {
  reviews(
    where: { reviewedUserUid: { eq_expr: "auth.uid" } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    rating
    comment
    createdAt
    helpful
    reviewer {
      uid
      displayName
    }
    lendingRequest {
      id
      startDate
      endDate
      status
      borrower {
        uid
        displayName
      }
      lender {
        uid
        displayName
      }
      item {
        id
        title
        imageUrl
        category
      }
    }
  }
}

query GetCurrentUser @auth(level: USER) {
  users(where: { uid: { eq_expr: "auth.uid" } }) {
    uid
    displayName
    email
    photoUrl
    location
    createdAt
    averageRating
    reviewCount
  }
}

query FindUserByDisplayName($displayName: String!) @auth(level: USER) {
  users(where: { displayName: { eq: $displayName } }) {
    uid
    displayName
    averageRating
    reviewCount
  }
}

query ListReviews @auth(level: PUBLIC) {
  reviews {
    id
    rating
    comment
    reviewedUser {
      uid
      displayName
      averageRating
      reviewCount
    }
  }
}
