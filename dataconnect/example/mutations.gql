mutation UpsertUser($displayName: String!, $email: String!, $photoUrl: String) @auth(level: USER) {
  user_upsert(data: {
    uid_expr: "auth.uid"
    displayName: $displayName
    email: $email
    photoUrl: $photoUrl
    createdAt_expr: "request.time"
  })
}

mutation CreateItem(
  $title: String!
  $description: String!
  $price: Float
  $imageUrl: String
  $locationDetails: String
  $category: String
  $condition: String
) @auth(level: USER) {
  item_insert(data: {
    title: $title
    description: $description
    price: $price
    imageUrl: $imageUrl
    locationDetails: $locationDetails
    category: $category
    condition: $condition
    status: "available"
    createdAt_expr: "request.time"
    lenderUid_expr: "auth.uid"
  })
}

mutation UpdateItem(
  $id: UUID!
  $title: String!
  $description: String!
  $price: Float
  $imageUrl: String
  $locationDetails: String
  $category: String
  $condition: String
) @auth(level: USER) {
  item_update(
    id: $id
    data: {
      title: $title
      description: $description
      price: $price
      imageUrl: $imageUrl
      locationDetails: $locationDetails
      category: $category
      condition: $condition
    }
  )
}

mutation UpdateItemStatus($id: UUID!, $status: String!) @auth(level: USER) {
  item_update(id: $id, data: { status: $status })
}

mutation DeleteItem($id: UUID!) @auth(level: USER) {
  item_delete(id: $id)
}

mutation CreateLendingRequest(
  $itemId: UUID!
  $lenderUid: String!
  $borrowerNotes: String!
  $startDate: Date
  $endDate: Date
) @auth(level: USER) {
  lendingRequest_insert(data: {
    itemId: $itemId
    lenderUid: $lenderUid
    borrowerUid_expr: "auth.uid"
    borrowerNotes: $borrowerNotes
    startDate: $startDate
    endDate: $endDate
    status: "pending"
    requestedAt_expr: "request.time"
  })
}

mutation UpdateLendingRequestStatus($id: UUID!, $status: String!) @auth(level: USER) {
  lendingRequest_update(id: $id, data: { status: $status })
}

mutation UpdateUserRating($uid: String!, $averageRating: Float!, $reviewCount: Int!) @auth(level: USER) {
  user_update(key: { uid: $uid }, data: {
    averageRating: $averageRating
    reviewCount: $reviewCount
  })
}

mutation CreateReview(
  $reviewedUserUid: String!
  $rating: Int!
  $comment: String!
  $lendingRequestId: UUID
) @auth(level: USER) {
  review_insert(data: {
    reviewedUserUid: $reviewedUserUid
    reviewerUid_expr: "auth.uid"
    rating: $rating
    comment: $comment
    lendingRequestId: $lendingRequestId
    createdAt_expr: "request.time"
  })
}
